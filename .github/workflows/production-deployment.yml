name: Chvalotce Deployment

env:
  SERVER_USERNAME: root
  SERVER_URL: 65.109.5.66
  DOCKER_IMAGE_NAME: worshiptool

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      # 1 SSH: vytáhne všechny env soubory naráz
      - name: Fetch all env files from remote (single SSH)
        shell: bash
        run: |
          mkdir -p envs
          ssh "${{ env.SERVER_USERNAME }}@${{ env.SERVER_URL }}" '
          tar -cf - \
              /root/worshiptool/chvalotce/frontend/.env \
              /root/worshiptool/chvalotce/frontend/.worshipcz.env \
              /root/worshiptool/hallelujahhub/frontend/.env \
              /root/worshiptool/chwalmy/frontend/.env
          ' | tar -xf - -C envs

          # přejmenuj na krátké názvy
          mv "envs/root/worshiptool/chvalotce/frontend/.env" envs/chvalotce.env
          mv "envs/root/worshiptool/chvalotce/frontend/.worshipcz.env" envs/worshipcz.env
          mv "envs/root/worshiptool/hallelujahhub/frontend/.env" envs/hallelujahhub.env
          mv "envs/root/worshiptool/chwalmy/frontend/.env" envs/chwalmy.env

          # uklid
          rm -rf envs/root

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # build+push 4x s jiným .env a tagy
      - name: Build & Push all variants
        shell: bash
        run: |
          set -euo pipefail

          build_one () {
          local key="$1"
          local envfile="$2"
          local suffixes="$3"

          cp "$envfile" ./.env

          IFS=',' read -ra SUFFIXES <<< "$suffixes"
          TAG_ARGS=()
          for s in "${SUFFIXES[@]}"; do
              TAG_ARGS+=("-t" "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${s}")
          done

          docker build "${TAG_ARGS[@]}" .

          for s in "${SUFFIXES[@]}"; do
              docker push "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${s}"
          done
          }

          build_one chvalotce     envs/chvalotce.env     "latest,chvalotce-prod"
          build_one worshipcz     envs/worshipcz.env     "worshipcz-prod"
          build_one hallelujahhub envs/hallelujahhub.env "hallelujahhub-prod"
          build_one chwalmy       envs/chwalmy.env       "chwalmy-prod"

          rm -f ./.env

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      # 1 SSH + 1 docker compose příkaz
      - name: Redeploy frontends
        run: |
          ssh -o ServerAliveInterval=1000 "${{ env.SERVER_USERNAME }}@${{ env.SERVER_URL }}" \
          "cd /root/worshiptool/ && \
          docker compose \
              --profile chvalotce \
              --profile hallelujahhub \
              --profile chwalmy \
              up -d --pull always \
              frontend-chvalotce frontend-worshipcz frontend-hallelujahhub frontend-chwalmy"
