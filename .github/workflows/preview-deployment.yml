name: Preview Deploy

env:
  DOCKER_IMAGE_NAME: worshiptool

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  upload-to-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEVELOPMENT_SSH_KEY }}
          known_hosts: ${{ secrets.DEVELOPMENT_SSH_KNOWN_HOSTS }}

      - name: Copy .env from remote server
        run: scp -o StrictHostKeyChecking=no "${{ secrets.DEVELOPMENT_SERVER_USERNAME }}@${{ secrets.DEVELOPMENT_SERVER_URL }}:/root/worshiptool/dev/frontend/.env" ./.env

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FRONTEND_URL="https://preview.chvalotce.cz/pr-${{ github.event.pull_request.number }}" \
            --build-arg NEXT_PUBLIC_FRONTEND_HOSTNAME="preview.chvalotce.cz" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:preview-pr-${{ github.event.pull_request.number }} \
            .

      - name: Push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:preview-pr-${{ github.event.pull_request.number }}

  deploy-to-preview-server:
    needs: upload-to-docker
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEVELOPMENT_SSH_KEY }}
          known_hosts: ${{ secrets.DEVELOPMENT_SSH_KNOWN_HOSTS }}

      - name: Redeploy preview
        run: |
          ssh -o ServerAliveInterval=1000 "${{ secrets.DEVELOPMENT_SERVER_USERNAME }}@${{ secrets.DEVELOPMENT_SERVER_URL }}" \
          "cd /root/worshiptool/dev && PR=${{ github.event.pull_request.number }} docker compose up -d --pull always frontend-preview"
