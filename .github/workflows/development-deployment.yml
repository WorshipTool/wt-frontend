name: Development Deploy, E2E Tests

env:
  DOCKER_IMAGE_NAME: worshiptool

on:
  push:
    branches: [develop]

jobs:
  upload-to-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEVELOPMENT_SSH_KEY }}
          known_hosts: ${{ secrets.DEVELOPMENT_SSH_KNOWN_HOSTS }}

      - name: Copy .env from remote server
        run: scp -o StrictHostKeyChecking=no "${{ secrets.DEVELOPMENT_SERVER_USERNAME }}@${{ secrets.DEVELOPMENT_SERVER_URL }}:/root/worshiptool/dev/frontend/.env" ./.env
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/${{env.DOCKER_IMAGE_NAME}}:dev .

      - name: Log Images
        run: docker images

      - name: Push
        run: docker push ${{secrets.DOCKERHUB_USERNAME}}/${{env.DOCKER_IMAGE_NAME}}:dev

  deploy-to-development-server:
    needs: upload-to-docker
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEVELOPMENT_SSH_KEY }}
          known_hosts: ${{ secrets.DEVELOPMENT_SSH_KNOWN_HOSTS }}

      - name: Redeploy application
        run: |
          ssh -o ServerAliveInterval=1000 "${{ secrets.DEVELOPMENT_SERVER_USERNAME }}@${{ secrets.DEVELOPMENT_SERVER_URL }}" \
          "cd c && docker compose up -d --pull always frontend-dev"

  run-smoke-tests:
    needs: deploy-to-development-server
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.51.1-jammy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Vytvoř .env ze secretu
        run: echo "${{ secrets.TEST_ENVS }}" > .env

      - name: Install deps
        run: npm ci

      - name: Run jest tests
        run: npm run test:jest

      - name: Run smoke tests
        run: npm run test:e2e:smoke-only

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-smoke-${{ github.run_id }}
          path: |
            playwright-report/**
            temp/tests/results/**
          if-no-files-found: ignore
          retention-days: 7

  run-critical-tests:
    needs: run-smoke-tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.51.1-jammy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Vytvoř .env ze secretu
        run: echo "${{ secrets.TEST_ENVS }}" > .env

      - name: Install deps
        run: npm ci

      - name: Run critical tests
        run: npm run test:e2e:critical-only

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-critical-${{ github.run_id }}
          path: |
            playwright-report/**
            temp/tests/results/**
          if-no-files-found: ignore
          retention-days: 7

  run-full-tests:
    needs: run-critical-tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.51.1-jammy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Vytvoř .env ze secretu
        run: echo "${{ secrets.TEST_ENVS }}" > .env

      - name: Install deps
        run: npm ci

      - name: Run full tests
        run: npm run test:e2e:full-only

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-full-${{ github.run_id }}
          path: |
            playwright-report/**
            temp/tests/results/**
          if-no-files-found: ignore
          retention-days: 7
