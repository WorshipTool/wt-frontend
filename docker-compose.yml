services:
    frontend:
        build:
            context: .
            args:
                # Public vars are baked in at build time by Next.js
                NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:5500}
                NEXT_PUBLIC_FRONTEND_HOSTNAME: ${NEXT_PUBLIC_FRONTEND_HOSTNAME:-localhost}
                NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5501}
                NEXT_PUBLIC_TEMPORARILY_UNAVAILABLE: ${NEXT_PUBLIC_TEMPORARILY_UNAVAILABLE:-false}
                NEXT_PUBLIC_DISABLE_WEBSOCKETS: ${NEXT_PUBLIC_DISABLE_WEBSOCKETS:-false}
                NEXT_PUBLIC_USE_SUBDOMAINS: ${NEXT_PUBLIC_USE_SUBDOMAINS:-false}
                NEXT_PUBLIC_CONFIGCAT_API_KEY: ${NEXT_PUBLIC_CONFIGCAT_API_KEY:-}
                NEXT_PUBLIC_STATSIG_API_KEY: ${NEXT_PUBLIC_STATSIG_API_KEY:-}
                NEXT_PUBLIC_AUTH_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_COOKIE_NAME:-authusmambus}
                NEXT_PUBLIC_STRIPE_SUPPORT_URL: ${NEXT_PUBLIC_STRIPE_SUPPORT_URL:-}
                NEXT_PUBLIC_IMPLEMENT_IDEA_URL: ${NEXT_PUBLIC_IMPLEMENT_IDEA_URL:-}
                NEXT_PUBLIC_PREVIEW_BASE_URL: ${NEXT_PUBLIC_PREVIEW_BASE_URL:-}
                NEXT_PUBLIC_PREVIEW_MODE: ${NEXT_PUBLIC_PREVIEW_MODE:-false}
                NEXT_PUBLIC_PREVIEW_PR_NUMBER: ${NEXT_PUBLIC_PREVIEW_PR_NUMBER:-}
                NEXT_PUBLIC_PREVIEW_PR_TITLE: ${NEXT_PUBLIC_PREVIEW_PR_TITLE:-}
        container_name: wt-frontend
        restart: unless-stopped
        ports:
            - "${HOST_PORT:-5500}:3000"
        environment:
            # Runtime
            PORT: 3000
            HOSTNAME: "0.0.0.0"
            NODE_ENV: ${NODE_ENV:-production}

            # Content
            CONTENT_VERSION: ${CONTENT_VERSION:-chvalotce}

            # Feature flags (server-side)
            STATSTIG_SERVER_SECRET_KEY: ${STATSTIG_SERVER_SECRET_KEY:-}

            # Testing
            TEST_WITH_SLOWDOWN: ${TEST_WITH_SLOWDOWN:-false}
